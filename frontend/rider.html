<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bite & Sips — Rider</title>
  <link rel="stylesheet" href="rider.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>
<body>
  <main class="driver-shell">
    <header class="driver-head">
      <div>
        <h1>Rider tracking</h1>
        <p class="muted" id="driver-sub">Share your location while delivering.</p>
      </div>
      <button type="button" class="btn" id="btn-stop" disabled>Stop</button>
    </header>

    <section class="card">
      <div class="row">
        <div><strong>Order</strong> <span class="mono" id="order-id">—</span></div>
        <div class="muted" id="status">Waiting for location permission…</div>
      </div>
      <div id="map" class="map" role="region" aria-label="Delivery map"></div>
      <p class="muted small" id="hint">Keep this page open during delivery.</p>
    </section>
  </main>

  <script src="./config.js"></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="rider.js"></script>
</body>
</html>
